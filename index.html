<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frö- och Såddloggbok</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        h1 { color: #2d5016; text-align: center; margin-bottom: 10px; }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            background: #4caf50;
            color: white;
        }
        .btn:hover { background: #45a049; }
        .card {
            background: white;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
        }
        .card:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌱 Frö- och Såddloggbok</h1>
        </div>
        
        <div id="setupSection" style="background: white; padding: 30px; border-radius: 10px;">
            <h2 style="margin-bottom: 20px;">Firebase Setup</h2>
            <input type="text" id="apiKey" placeholder="API Key" style="width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 5px;">
            <input type="text" id="projectId" placeholder="Project ID" style="width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 5px;">
            <button class="btn" onclick="sparaConfig()" style="width: 100%; margin-top: 10px;">Spara & Anslut</button>
        </div>
        
        <div id="appContent" style="display: none;">
            <div style="background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                <p id="status">Ansluten!</p>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button class="btn" onclick="laddaData()">🔄 Ladda data</button>
                    <button class="btn" onclick="nySadd()">➕ Ny Sådd</button>
                </div>
            </div>
            
            <div id="breadcrumb" style="display: none; background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
                <span onclick="visaVaxtlista()" style="cursor: pointer; color: #4caf50; font-weight: bold;">🏠 Hem</span>
                <span id="breadcrumbPath" style="color: #666;"></span>
            </div>
            
            <div id="container"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        
        let db = null;
        let auth = null;
        let data = [];
        let currentView = 'vaxtlista'; // 'vaxtlista', 'sortlista', 'detaljer'
        let selectedVaxt = null;
        let selectedSort = null;
        
        window.sparaConfig = function() {
            console.log('sparaConfig körs');
            const apiKey = document.getElementById('apiKey').value.trim();
            const projectId = document.getElementById('projectId').value.trim();
            
            if (!apiKey || !projectId) {
                alert('Fyll i både API Key och Project ID!');
                return;
            }
            
            const config = {
                apiKey: apiKey,
                projectId: projectId,
                authDomain: projectId + '.firebaseapp.com',
                storageBucket: projectId + '.appspot.com'
            };
            
            localStorage.setItem('firebaseConfig', JSON.stringify(config));
            initFirebase(config);
        };
        
        window.laddaData = async function() {
            if (!db) {
                alert('Firebase inte anslutet!');
                return;
            }
            
            try {
                const snapshot = await getDocs(collection(db, 'fron'));
                data = [];
                snapshot.forEach(doc => {
                    data.push({ firebaseId: doc.id, ...doc.data() });
                });
                
                // Sortera nyast först
                data.sort((a, b) => new Date(b.skapad || 0) - new Date(a.skapad || 0));
                
                document.getElementById('status').textContent = 'Laddade ' + data.length + ' poster';
                visaVaxtlista();
            } catch (error) {
                alert('Fel: ' + error.message);
            }
        };
        
        window.nySadd = async function() {
            if (!db) {
                alert('Firebase inte anslutet!');
                return;
            }
            
            const nyPost = {
                vaxt: '',
                sort: '',
                saddDatum: '',
                plats: '',
                antalFron: '',
                ar: new Date().getFullYear(),
                anteckningar: '',
                skapad: new Date().toISOString()
            };
            
            try {
                const docRef = await addDoc(collection(db, 'fron'), nyPost);
                console.log('Skapade ny post:', docRef.id);
                
                // Ladda om data och visa detaljvy direkt
                await laddaData();
                
                // Visa den nya posten överst (den är tom så vi visar alla)
                currentView = 'detaljer';
                selectedVaxt = null;
                selectedSort = null;
                document.getElementById('breadcrumb').style.display = 'none';
                visaAllaDetaljer();
                
                // Scrolla till toppen
                window.scrollTo({ top: 0, behavior: 'smooth' });
                
            } catch (error) {
                alert('Kunde inte skapa ny sådd: ' + error.message);
            }
        };
        
        window.uppdatera = async function(firebaseId, falt, varde) {
            if (!db) return;
            
            const post = data.find(p => p.firebaseId === firebaseId);
            if (!post) return;
            
            post[falt] = varde;
            
            try {
                await updateDoc(doc(db, 'fron', firebaseId), { [falt]: varde });
                console.log('Uppdaterade', falt, 'till', varde);
            } catch (error) {
                console.error('Kunde inte uppdatera:', error);
            }
        };
        
        window.radera = async function(firebaseId) {
            if (!confirm('Är du säker på att du vill radera denna sådd?')) return;
            if (!db) return;
            
            try {
                await deleteDoc(doc(db, 'fron', firebaseId));
                console.log('Raderade post:', firebaseId);
                
                // Ta bort från lokal data
                data = data.filter(p => p.firebaseId !== firebaseId);
                
                // Gå tillbaka till växtlistan
                visaVaxtlista();
                
            } catch (error) {
                alert('Kunde inte radera: ' + error.message);
            }
        };
        
        window.visaVaxtlista = function() {
            currentView = 'vaxtlista';
            selectedVaxt = null;
            selectedSort = null;
            document.getElementById('breadcrumb').style.display = 'none';
            
            const container = document.getElementById('container');
            
            if (data.length === 0) {
                container.innerHTML = '<div style="background: white; padding: 40px; border-radius: 10px; text-align: center;"><h2>Ingen data</h2></div>';
                return;
            }
            
            // Gruppera på växt
            const vaxter = {};
            data.forEach(p => {
                const vaxt = p.vaxt || 'Okänd växt';
                if (!vaxter[vaxt]) vaxter[vaxt] = [];
                vaxter[vaxt].push(p);
            });
            
            container.innerHTML = Object.keys(vaxter).sort().map(vaxt => {
                const poster = vaxter[vaxt];
                const antalSorter = new Set(poster.map(p => p.sort || 'Ingen sort')).size;
                return `
                    <div class="card" onclick="visaSortlista('${vaxt}')">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <h2 style="color: #2d5016; margin-bottom: 5px;">🌱 ${vaxt}</h2>
                                <p style="color: #666;">${antalSorter} ${antalSorter === 1 ? 'sort' : 'sorter'} • ${poster.length} ${poster.length === 1 ? 'sådd' : 'sådder'}</p>
                            </div>
                            <div style="font-size: 2em; color: #4caf50;">→</div>
                        </div>
                    </div>
                `;
            }).join('');
        };
        
        window.visaSortlista = function(vaxt) {
            currentView = 'sortlista';
            selectedVaxt = vaxt;
            selectedSort = null;
            
            document.getElementById('breadcrumb').style.display = 'block';
            document.getElementById('breadcrumbPath').textContent = ' → ' + vaxt;
            
            const container = document.getElementById('container');
            const filtrerad = data.filter(p => p.vaxt === vaxt);
            
            // Gruppera på sort
            const sorter = {};
            filtrerad.forEach(p => {
                const sort = p.sort || 'Ingen sort';
                if (!sorter[sort]) sorter[sort] = [];
                sorter[sort].push(p);
            });
            
            container.innerHTML = Object.keys(sorter).sort().map(sort => {
                const poster = sorter[sort];
                return `
                    <div class="card" onclick="visaDetaljer('${vaxt}', '${sort.replace(/'/g, "\\'")}')">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <h3 style="color: #2d5016; margin-bottom: 5px;">${sort}</h3>
                                <p style="color: #666;">${poster.length} ${poster.length === 1 ? 'sådd' : 'sådder'}</p>
                            </div>
                            <div style="font-size: 2em; color: #4caf50;">→</div>
                        </div>
                    </div>
                `;
            }).join('');
        };
        
        window.visaDetaljer = function(vaxt, sort) {
            currentView = 'detaljer';
            selectedVaxt = vaxt;
            selectedSort = sort;
            
            document.getElementById('breadcrumb').style.display = 'block';
            document.getElementById('breadcrumbPath').textContent = ' → ' + vaxt + ' → ' + sort;
            
            const container = document.getElementById('container');
            const filtrerad = data.filter(p => p.vaxt === vaxt && p.sort === sort);
            
            if (filtrerad.length === 0) {
                container.innerHTML = '<div style="background: white; padding: 40px; border-radius: 10px; text-align: center;"><h2>Ingen data</h2></div>';
                return;
            }
            
            container.innerHTML = filtrerad.map(p => `
                <div style="background: white; padding: 25px; margin-bottom: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #f0f0f0;">
                        <h3 style="color: #2d5016; margin: 0;">${p.vaxt || 'Växt'} - ${p.sort || 'Sort'}</h3>
                        <button onclick="radera('${p.firebaseId}')" style="background: #f44336; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;">🗑️ Ta bort</button>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                        <div>
                            <label style="font-weight: bold; display: block; margin-bottom: 5px; color: #555;">Växt/Grönsak</label>
                            <input value="${p.vaxt || ''}" onchange="uppdatera('${p.firebaseId}', 'vaxt', this.value)" placeholder="t.ex. Tomat" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 5px;">
                        </div>
                        
                        <div>
                            <label style="font-weight: bold; display: block; margin-bottom: 5px; color: #555;">Sort</label>
                            <input value="${p.sort || ''}" onchange="uppdatera('${p.firebaseId}', 'sort', this.value)" placeholder="t.ex. Bovictus" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 5px;">
                        </div>
                        
                        <div>
                            <label style="font-weight: bold; display: block; margin-bottom: 5px; color: #555;">Datum sådd</label>
                            <input type="date" value="${p.saddDatum || ''}" onchange="uppdatera('${p.firebaseId}', 'saddDatum', this.value)" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 5px;">
                        </div>
                        
                        <div>
                            <label style="font-weight: bold; display: block; margin-bottom: 5px; color: #555;">Plats</label>
                            <input value="${p.plats || ''}" onchange="uppdatera('${p.firebaseId}', 'plats', this.value)" placeholder="t.ex. Inne, växthus" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 5px;">
                        </div>
                        
                        <div>
                            <label style="font-weight: bold; display: block; margin-bottom: 5px; color: #555;">Antal frön</label>
                            <input type="number" value="${p.antalFron || ''}" onchange="uppdatera('${p.firebaseId}', 'antalFron', this.value)" placeholder="0" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 5px;">
                        </div>
                        
                        <div>
                            <label style="font-weight: bold; display: block; margin-bottom: 5px; color: #555;">År</label>
                            <input type="number" value="${p.ar || new Date().getFullYear()}" onchange="uppdatera('${p.firebaseId}', 'ar', this.value)" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 5px;">
                        </div>
                    </div>
                    
                    <div style="margin-top: 15px;">
                        <label style="font-weight: bold; display: block; margin-bottom: 5px; color: #555;">Anteckningar</label>
                        <textarea onchange="uppdatera('${p.firebaseId}', 'anteckningar', this.value)" placeholder="Dina anteckningar..." style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 5px; min-height: 80px; resize: vertical;">${p.anteckningar || ''}</textarea>
                    </div>
                </div>
            `).join('');
        };
        
        function visaAllaDetaljer() {
            const container = document.getElementById('container');
            
            if (data.length === 0) {
                container.innerHTML = '<div style="background: white; padding: 40px; border-radius: 10px; text-align: center;"><h2>Ingen data</h2></div>';
                return;
            }
            
            // Visa alla poster (för nya sådder)
            container.innerHTML = data.slice(0, 10).map(p => `
                <div style="background: white; padding: 25px; margin-bottom: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #f0f0f0;">
                        <h3 style="color: #2d5016; margin: 0;">${p.vaxt || 'Ny växt'} ${p.sort ? '- ' + p.sort : ''}</h3>
                        <button onclick="radera('${p.firebaseId}')" style="background: #f44336; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;">🗑️</button>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                        <div>
                            <label style="font-weight: bold; display: block; margin-bottom: 5px; color: #555;">Växt/Grönsak</label>
                            <input value="${p.vaxt || ''}" onchange="uppdatera('${p.firebaseId}', 'vaxt', this.value)" placeholder="t.ex. Tomat" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 5px;">
                        </div>
                        
                        <div>
                            <label style="font-weight: bold; display: block; margin-bottom: 5px; color: #555;">Sort</label>
                            <input value="${p.sort || ''}" onchange="uppdatera('${p.firebaseId}', 'sort', this.value)" placeholder="t.ex. Bovictus" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 5px;">
                        </div>
                        
                        <div>
                            <label style="font-weight: bold; display: block; margin-bottom: 5px; color: #555;">Datum sådd</label>
                            <input type="date" value="${p.saddDatum || ''}" onchange="uppdatera('${p.firebaseId}', 'saddDatum', this.value)" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 5px;">
                        </div>
                        
                        <div>
                            <label style="font-weight: bold; display: block; margin-bottom: 5px; color: #555;">År</label>
                            <input type="number" value="${p.ar || new Date().getFullYear()}" onchange="uppdatera('${p.firebaseId}', 'ar', this.value)" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 5px;">
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function initFirebase(config) {
            try {
                const app = initializeApp(config);
                db = getFirestore(app);
                auth = getAuth(app);
                
                document.getElementById('setupSection').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
                
                window.laddaData();
            } catch (error) {
                alert('Firebase-fel: ' + error.message);
            }
        }
        
        // Starta
        const savedConfig = localStorage.getItem('firebaseConfig');
        if (savedConfig) {
            try {
                const config = JSON.parse(savedConfig);
                document.getElementById('apiKey').value = config.apiKey;
                document.getElementById('projectId').value = config.projectId;
                initFirebase(config);
            } catch (e) {
                console.error('Fel vid laddning av config:', e);
            }
        }
    </script>
</body>
</html>
