<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frö- och Såddloggbok</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        h1 { color: #2d5016; text-align: center; margin-bottom: 10px; }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            background: #4caf50;
            color: white;
        }
        .btn:hover { background: #45a049; }
        .card {
            background: white;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
        }
        .card:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌱 Frö- och Såddloggbok</h1>
        </div>
        
        <div id="setupSection" style="background: white; padding: 30px; border-radius: 10px;">
            <h2 style="margin-bottom: 20px;">Firebase Setup</h2>
            <input type="text" id="apiKey" placeholder="API Key" style="width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 5px;">
            <input type="text" id="projectId" placeholder="Project ID" style="width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 5px;">
            <button class="btn" onclick="sparaConfig()" style="width: 100%; margin-top: 10px;">Spara & Anslut</button>
        </div>
        
        <div id="appContent" style="display: none;">
            <div style="background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                <p id="status">Ansluten!</p>
                <button class="btn" onclick="laddaData()" style="margin-top: 10px;">Ladda data</button>
            </div>
            
            <div id="breadcrumb" style="display: none; background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
                <span onclick="visaVaxtlista()" style="cursor: pointer; color: #4caf50; font-weight: bold;">🏠 Hem</span>
                <span id="breadcrumbPath" style="color: #666;"></span>
            </div>
            
            <div id="container"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        
        let db = null;
        let auth = null;
        let data = [];
        let currentView = 'vaxtlista'; // 'vaxtlista', 'sortlista', 'detaljer'
        let selectedVaxt = null;
        let selectedSort = null;
        
        window.sparaConfig = function() {
            console.log('sparaConfig körs');
            const apiKey = document.getElementById('apiKey').value.trim();
            const projectId = document.getElementById('projectId').value.trim();
            
            if (!apiKey || !projectId) {
                alert('Fyll i både API Key och Project ID!');
                return;
            }
            
            const config = {
                apiKey: apiKey,
                projectId: projectId,
                authDomain: projectId + '.firebaseapp.com',
                storageBucket: projectId + '.appspot.com'
            };
            
            localStorage.setItem('firebaseConfig', JSON.stringify(config));
            initFirebase(config);
        };
        
        window.laddaData = async function() {
            if (!db) {
                alert('Firebase inte anslutet!');
                return;
            }
            
            try {
                const snapshot = await getDocs(collection(db, 'fron'));
                data = [];
                snapshot.forEach(doc => {
                    data.push({ id: doc.id, ...doc.data() });
                });
                
                document.getElementById('status').textContent = 'Laddade ' + data.length + ' poster';
                visaVaxtlista();
            } catch (error) {
                alert('Fel: ' + error.message);
            }
        };
        
        window.visaVaxtlista = function() {
            currentView = 'vaxtlista';
            selectedVaxt = null;
            selectedSort = null;
            document.getElementById('breadcrumb').style.display = 'none';
            
            const container = document.getElementById('container');
            
            if (data.length === 0) {
                container.innerHTML = '<div style="background: white; padding: 40px; border-radius: 10px; text-align: center;"><h2>Ingen data</h2></div>';
                return;
            }
            
            // Gruppera på växt
            const vaxter = {};
            data.forEach(p => {
                const vaxt = p.vaxt || 'Okänd växt';
                if (!vaxter[vaxt]) vaxter[vaxt] = [];
                vaxter[vaxt].push(p);
            });
            
            container.innerHTML = Object.keys(vaxter).sort().map(vaxt => {
                const poster = vaxter[vaxt];
                const antalSorter = new Set(poster.map(p => p.sort || 'Ingen sort')).size;
                return `
                    <div class="card" onclick="visaSortlista('${vaxt}')">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <h2 style="color: #2d5016; margin-bottom: 5px;">🌱 ${vaxt}</h2>
                                <p style="color: #666;">${antalSorter} ${antalSorter === 1 ? 'sort' : 'sorter'} • ${poster.length} ${poster.length === 1 ? 'sådd' : 'sådder'}</p>
                            </div>
                            <div style="font-size: 2em; color: #4caf50;">→</div>
                        </div>
                    </div>
                `;
            }).join('');
        };
        
        window.visaSortlista = function(vaxt) {
            currentView = 'sortlista';
            selectedVaxt = vaxt;
            selectedSort = null;
            
            document.getElementById('breadcrumb').style.display = 'block';
            document.getElementById('breadcrumbPath').textContent = ' → ' + vaxt;
            
            const container = document.getElementById('container');
            const filtrerad = data.filter(p => p.vaxt === vaxt);
            
            // Gruppera på sort
            const sorter = {};
            filtrerad.forEach(p => {
                const sort = p.sort || 'Ingen sort';
                if (!sorter[sort]) sorter[sort] = [];
                sorter[sort].push(p);
            });
            
            container.innerHTML = Object.keys(sorter).sort().map(sort => {
                const poster = sorter[sort];
                return `
                    <div class="card" onclick="visaDetaljer('${vaxt}', '${sort.replace(/'/g, "\\'")}')">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <h3 style="color: #2d5016; margin-bottom: 5px;">${sort}</h3>
                                <p style="color: #666;">${poster.length} ${poster.length === 1 ? 'sådd' : 'sådder'}</p>
                            </div>
                            <div style="font-size: 2em; color: #4caf50;">→</div>
                        </div>
                    </div>
                `;
            }).join('');
        };
        
        window.visaDetaljer = function(vaxt, sort) {
            currentView = 'detaljer';
            selectedVaxt = vaxt;
            selectedSort = sort;
            
            document.getElementById('breadcrumb').style.display = 'block';
            document.getElementById('breadcrumbPath').textContent = ' → ' + vaxt + ' → ' + sort;
            
            const container = document.getElementById('container');
            const filtrerad = data.filter(p => p.vaxt === vaxt && p.sort === sort);
            
            if (filtrerad.length === 0) {
                container.innerHTML = '<div style="background: white; padding: 40px; border-radius: 10px; text-align: center;"><h2>Ingen data</h2></div>';
                return;
            }
            
            container.innerHTML = filtrerad.map(p => `
                <div style="background: white; padding: 25px; margin-bottom: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                    <h3 style="color: #2d5016; margin-bottom: 15px;">${p.vaxt || 'Växt'} - ${p.sort || 'Sort'}</h3>
                    <p><strong>Datum sådd:</strong> ${p.saddDatum || 'Ej angivet'}</p>
                    <p><strong>År:</strong> ${p.ar || 'Ej angivet'}</p>
                    <p><strong>Plats:</strong> ${p.plats || 'Ej angivet'}</p>
                    ${p.anteckningar ? '<p><strong>Anteckningar:</strong> ' + p.anteckningar + '</p>' : ''}
                </div>
            `).join('');
        };
        
        function initFirebase(config) {
            try {
                const app = initializeApp(config);
                db = getFirestore(app);
                auth = getAuth(app);
                
                document.getElementById('setupSection').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
                
                window.laddaData();
            } catch (error) {
                alert('Firebase-fel: ' + error.message);
            }
        }
        
        // Starta
        const savedConfig = localStorage.getItem('firebaseConfig');
        if (savedConfig) {
            try {
                const config = JSON.parse(savedConfig);
                document.getElementById('apiKey').value = config.apiKey;
                document.getElementById('projectId').value = config.projectId;
                initFirebase(config);
            } catch (e) {
                console.error('Fel vid laddning av config:', e);
            }
        }
    </script>
</body>
</html>
